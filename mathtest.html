<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>math test</title>
    <meta name="description" content="67" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./css.css" />
  </head>
  <body>
    <nav id="main-nav">
      <div id="nav-slider"></div>
      <div class="nav-item active" data-page="home">Home</div>
      <div class="nav-item" data-page="about">About</div>
      <div class="nav-item" data-page="contact">Contact</div>
      <div class="nav-item" data-page="store">Store</div>
    </nav>
    <div class="spacer"></div>
    <h1 id="prob">2+2=</h1>
    <input id="N" type="text" oninput="action(this.value)" />
    <hr />
    <a href="index.html"> Back</a>
    <script async defer>
      var a,
        b,
        op,
        correct = 4,
        score = 0;
      var start;
      var num = 0;
      function action(z) {
        if (num == 0) {
          start = Date.now();
          console.log(num);
        }
        num++;
        if (z == correct) {
          a = Math.floor(Math.random() * 12);
          b = Math.floor(Math.random() * 11);
          op = "+-"[Math.floor(Math.random() * 2)];
          if (op == "+") correct = a + b;
          if (op == "-") correct = a - b;
          document.getElementById("prob").innerHTML =
            score + " | " + a + op + b + "=";
          score++;
          document.getElementById("N").value = "";
          document.getElementById("N").placeholder =
            `${((Date.now() - start + 1) / 1000 / num).toFixed(6)} seconds per problem`;
        }
      }
      //   setInterval(() => {
      //     document.getElementById("N").value = correct * Math.random();
      //     action(correct);
      //   }, 0);
    </script>
  </body>
</html>
